<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <g opacity="0.92">
    <!-- Main stem -->
    <path d="M250 480 C 245 380, 260 300, 240 220 C 225 160, 250 100, 230 30"
          stroke="#BAD797" stroke-width="3" fill="none" opacity="0.85"/>

    <!-- Cherry pairs along the branch (left side) -->
    <g transform="translate(190 150)">
      <path d="M0 0 C -4 -16, -2 -28, 8 -34" stroke="#BAD797" stroke-width="2.5" fill="none"/>
      <circle cx="-12" cy="14" r="20" fill="#670626"/>
      <circle cx="14" cy="20" r="20" fill="#670626"/>
      <ellipse cx="-19" cy="6" rx="5" ry="3" fill="#ffffff" opacity="0.4" transform="rotate(-30 -19 6)"/>
      <ellipse cx="7" cy="12" rx="5" ry="3" fill="#ffffff" opacity="0.4" transform="rotate(-30 7 12)"/>
    </g>

    <g transform="translate(170 320) scale(0.9)">
      <path d="M0 0 C -4 -16, -2 -28, 8 -34" stroke="#BAD797" stroke-width="2.5" fill="none"/>
      <circle cx="-12" cy="14" r="20" fill="#8c0d34"/>
      <circle cx="14" cy="20" r="20" fill="#670626"/>
      <ellipse cx="-19" cy="6" rx="5" ry="3" fill="#ffffff" opacity="0.4" transform="rotate(-30 -19 6)"/>
    </g>

    <!-- Cherry pairs (right side) -->
    <g transform="translate(300 110) scale(0.95)">
      <path d="M0 0 C 4 -16, 2 -28, -8 -34" stroke="#BAD797" stroke-width="2.5" fill="none"/>
      <circle cx="12" cy="14" r="19" fill="#670626"/>
      <circle cx="-14" cy="20" r="19" fill="#8c0d34"/>
      <ellipse cx="18" cy="7" rx="5" ry="3" fill="#ffffff" opacity="0.4" transform="rotate(30 18 7)"/>
    </g>

    <g transform="translate(305 250) scale(1.05)">
      <path d="M0 0 C 4 -16, 2 -28, -8 -34" stroke="#BAD797" stroke-width="2.5" fill="none"/>
      <circle cx="12" cy="14" r="20" fill="#670626"/>
      <circle cx="-14" cy="20" r="20" fill="#670626"/>
      <ellipse cx="18" cy="7" rx="5" ry="3" fill="#ffffff" opacity="0.4" transform="rotate(30 18 7)"/>
    </g>

    <g transform="translate(290 400) scale(0.85)">
      <path d="M0 0 C 4 -16, 2 -28, -8 -34" stroke="#BAD797" stroke-width="2.5" fill="none"/>
      <circle cx="12" cy="14" r="19" fill="#8c0d34"/>
      <circle cx="-14" cy="20" r="19" fill="#670626"/>
      <ellipse cx="18" cy="7" rx="5" ry="3" fill="#ffffff" opacity="0.4" transform="rotate(30 18 7)"/>
    </g>

    <!-- Small leaves on the stem -->
    <ellipse cx="235" cy="60" rx="14" ry="6" fill="#BAD797" opacity="0.7" transform="rotate(-30 235 60)"/>
    <ellipse cx="248" cy="200" rx="14" ry="6" fill="#BAD797" opacity="0.7" transform="rotate(25 248 200)"/>
    <ellipse cx="232" cy="360" rx="14" ry="6" fill="#BAD797" opacity="0.7" transform="rotate(-25 232 360)"/>

    <!-- Ice cubes scattered near the base -->
    <g transform="translate(150 440) rotate(-8)">
      <rect width="38" height="38" rx="5" fill="#BAD797" opacity="0.5"/>
      <rect x="6" y="6" width="26" height="26" rx="3" fill="#ffffff" opacity="0.25"/>
    </g>
    <g transform="translate(310 460) rotate(12)">
      <rect width="30" height="30" rx="5" fill="#BAD797" opacity="0.45"/>
      <rect x="5" y="5" width="20" height="20" rx="3" fill="#ffffff" opacity="0.25"/>
    </g>
    <g transform="translate(230 30) rotate(18)">
      <rect width="22" height="22" rx="4" fill="#BAD797" opacity="0.4"/>
      <rect x="4" y="4" width="14" height="14" rx="2" fill="#ffffff" opacity="0.25"/>
    </g>
  </g>
</svg>
