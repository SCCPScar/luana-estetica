    <!-- Leaves left -->
    <ellipse cx="190" cy="160" rx="38" ry="16" fill="#839958" opacity="0.85"
      transform="rotate(-35 190 160)"/>
    <ellipse cx="175" cy="240" rx="42" ry="17" fill="#6f8649" opacity="0.85"
      transform="rotate(-30 175 240)"/>
    <ellipse cx="165" cy="330" rx="46" ry="19" fill="#839958" opacity="0.8"
      transform="rotate(-25 165 330)"/>
    <ellipse cx="180" cy="410" rx="40" ry="17" fill="#6f8649" opacity="0.75"
      transform="rotate(-32 180 410)"/>

    <!-- Leaves right -->
    <ellipse cx="290" cy="120" rx="34" ry="14" fill="#9aab6e" opacity="0.85"
      transform="rotate(35 290 120)"/>
    <ellipse cx="300" cy="200" rx="40" ry="16" fill="#839958" opacity="0.85"
      transform="rotate(30 300 200)"/>
    <ellipse cx="295" cy="285" rx="44" ry="18" fill="#6f8649" opacity="0.8"
      transform="rotate(28 295 285)"/>
    <ellipse cx="285" cy="365" rx="38" ry="16" fill="#839958" opacity="0.75"
      transform="rotate(33 285 365)"/>

    <!-- Flower top -->
    <g transform="translate(228,28)">
      <ellipse cx="0" cy="-14" rx="9" ry="16" fill="#D3968C" opacity="0.92"/>
      <ellipse cx="13" cy="-7" rx="9" ry="16" fill="#D3968C" opacity="0.9" transform="rotate(72 13 -7)"/>
      <ellipse cx="13" cy="7" rx="9" ry="16" fill="#c98579" opacity="0.88" transform="rotate(144 13 7)"/>
      <ellipse cx="-13" cy="7" rx="9" ry="16" fill="#D3968C" opacity="0.9" transform="rotate(216 -13 7)"/>
      <ellipse cx="-13" cy="-7" rx="9" ry="16" fill="#c98579" opacity="0.88" transform="rotate(288 -13 -7)"/>
      <circle cx="0" cy="0" r="6" fill="#F7F4D5"/>
    </g>

    <!-- Small accent flower -->
    <g transform="translate(170,255)">
      <ellipse cx="0" cy="-9" rx="6" ry="10" fill="#f0d5d1" opacity="0.85"/>
      <ellipse cx="8" cy="-4" rx="6" ry="10" fill="#f0d5d1" opacity="0.85" transform="rotate(72 8 -4)"/>
      <ellipse cx="8" cy="5" rx="6" ry="10" fill="#D3968C" opacity="0.8" transform="rotate(144 8 5)"/>
      <ellipse cx="-8" cy="5" rx="6" ry="10" fill="#f0d5d1" opacity="0.85" transform="rotate(216 -8 5)"/>
      <ellipse cx="-8" cy="-4" rx="6" ry="10" fill="#D3968C" opacity="0.8" transform="rotate(288 -8 -4)"/>
