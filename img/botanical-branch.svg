<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <g opacity="0.9">
    <!-- Main stem -->
    <path d="M250 480 C 245 380, 260 300, 240 220 C 225 160, 250 100, 230 30"
